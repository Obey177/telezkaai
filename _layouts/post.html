---

<article class="post">
  <header class="post-header">
    <p class="eyebrow">AI · Prompt Engineering · Delivery</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
